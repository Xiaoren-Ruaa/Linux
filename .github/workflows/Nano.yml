name: Nano 8.2 Ultimate Hard-Static

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Install Toolchain
        run: sudo apt-get update && sudo apt-get install -y gcc-aarch64-linux-gnu binutils-aarch64-linux-gnu make wget

      - name: Build Ncurses 6.5 (Static)
        run: |
          wget https://invisible-mirror.net/archives/ncurses/ncurses-6.5.tar.gz
          tar -xf ncurses-6.5.tar.gz
          cd ncurses-6.5
          ./configure --host=aarch64-linux-gnu --with-shared=no --enable-static --enable-widec --without-debug CPPFLAGS="-P"
          make -j$(nproc)
          mkdir -p ../dist/lib ../dist/include/ncursesw
          cp lib/libncursesw.a ../dist/lib/
          cp include/*.h ../dist/include/ncursesw/
          cp include/*.h ../dist/include/

      - name: Build Nano 8.2 (Source Fix & Full Feature)
        run: |
          wget https://www.nano-editor.org/dist/v8/nano-8.2.tar.gz
          tar -xf nano-8.2.tar.gz
          cd nano-8.2
          # 【核心修复】直接在源码中屏蔽导致 1000002291.jpg 报错的系统头文件
          sed -i 's/#include <pwd.h>/#undef HAVE_PWD_H/g' src/nano.h
          
          ./configure --host=aarch64-linux-gnu \
                      CC="aarch64-linux-gnu-gcc -static" \
                      --enable-utf8 --enable-color --enable-extra --enable-nanorc \
                      --disable-nls --disable-libmagic \
                      ac_cv_header_pwd_h=no \
                      ac_cv_func_getpwuid=no ac_cv_func_getpwnam=no ac_cv_func_getpwent=no \
                      cross_compiling=yes \
                      CPPFLAGS="-I$(pwd)/../dist/include -I$(pwd)/../dist/include/ncursesw" \
                      LDFLAGS="-static -L$(pwd)/../dist/lib" \
                      LIBS="-lncursesw"
          make -j$(nproc)
          aarch64-linux-gnu-strip src/nano
