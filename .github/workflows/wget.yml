name: Build Static Bash for Android

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: ubuntu-24.04
    strategy:
      matrix:
        arch: [aarch64]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup NDK
        run: |
          wget -q https://dl.google.com/android/repository/android-ndk-r26b-linux.zip
          unzip -q android-ndk-r26b-linux.zip -d /tmp
          mv /tmp/android-ndk-r26b $HOME/android-ndk
          echo "$HOME/android-ndk" >> $GITHUB_PATH

      - name: Build ncurses (static)
        run: |
          ARCH=${{ matrix.arch }}
          case $ARCH in
            aarch64)
              HOST=aarch64-linux-android
              TOOLCHAIN=aarch64-linux-android21
              ;;
          esac

          TOOLCHAIN_PATH=$HOME/android-ndk/toolchains/llvm/prebuilt/linux-x86_64
          export PATH=$TOOLCHAIN_PATH/bin:$PATH

          mkdir -p deps && cd deps

          curl -L -o ncurses-6.4.tar.gz https://ftp.gnu.org/pub/gnu/ncurses/ncurses-6.4.tar.gz
          tar -xf ncurses-6.4.tar.gz
          cd ncurses-6.4

          ./configure \
            --host=$HOST \
            --disable-shared \
            --enable-static \
            --without-debug \
            --without-ada \
            --without-manpages \
            --without-tests \
            --without-progs \
            --with-normal \
            --without-cxx \
            --without-cxx-binding \
            --prefix=$(pwd)/install \
            CC="$TOOLCHAIN_PATH/bin/${TOOLCHAIN}-clang" \
            AR="$TOOLCHAIN_PATH/bin/llvm-ar" \
            RANLIB="$TOOLCHAIN_PATH/bin/llvm-ranlib" \
            CFLAGS="-static -Os -fPIE" \
            LDFLAGS="-static -s -fPIE"

          make -j$(nproc)
          make install
          cd ../..

      - name: Build readline (static)
        run: |
          ARCH=${{ matrix.arch }}
          case $ARCH in
            aarch64)
              HOST=aarch64-linux-android
              TOOLCHAIN=aarch64-linux-android21
              ;;
          esac

          TOOLCHAIN_PATH=$HOME/android-ndk/toolchains/llvm/prebuilt/linux-x86_64
          export PATH=$TOOLCHAIN_PATH/bin:$PATH

          cd deps

          curl -L -o readline-8.2.tar.gz https://ftp.gnu.org/gnu/readline/readline-8.2.tar.gz
          tar -xf readline-8.2.tar.gz
          cd readline-8.2

          sed -i 's/-D_FORTIFY_SOURCE=2//g' support/shobj-conf

          ./configure \
            --host=$HOST \
            --disable-shared \
            --enable-static \
            --prefix=$(pwd)/install \
            bash_cv_wcwidth_broken=no \
            CC="$TOOLCHAIN_PATH/bin/${TOOLCHAIN}-clang" \
            AR="$TOOLCHAIN_PATH/bin/llvm-ar" \
            RANLIB="$TOOLCHAIN_PATH/bin/llvm-ranlib" \
            CFLAGS="-static -Os -fPIE -I$(pwd)/../ncurses-6.4/install/include" \
            LDFLAGS="-static -s -fPIE -L$(pwd)/../ncurses-6.4/install/lib"

          make -j$(nproc)
          make install
          cd ../..

      - name: Create patch for bash
        run: |
          cat > android-bash.patch << 'EOF'
--- complete.c.orig	2026-04-07 08:00:00.000000000 +0000
+++ complete.c	2026-04-07 08:00:00.000000000 +0000
@@ -2283,7 +2283,7 @@
       /* We need to reset the file pointer to the beginning of the file before
 	 the re-read. */
       rewind (passwd_file);
-      setpwent ();
+      /* setpwent (); */
     }
 
   /* If we don't have a cached copy of the user database, or we're forcing a
@@ -2294,7 +2294,7 @@
 #endif
     }
 
-  while (entry = getpwent ())
+  while (0) /* entry = getpwent () */
     {
 #if defined (HAVE_GETPWUID) && defined (HAVE_GETPWNAM)
       if (entry->pw_uid == uid)
@@ -2313,7 +2313,7 @@
 	}
     }
 
-  endpwent ();
+  /* endpwent (); */
   if (passwd_file)
     fclose (passwd_file);
   passwd_file = (FILE *)NULL;
EOF

      - name: Build bash (static)
        run: |
          ARCH=${{ matrix.arch }}
          case $ARCH in
            aarch64)
              HOST=aarch64-linux-android
              TOOLCHAIN=aarch64-linux-android21
              ;;
          esac

          TOOLCHAIN_PATH=$HOME/android-ndk/toolchains/llvm/prebuilt/linux-x86_64
          export PATH=$TOOLCHAIN_PATH/bin:$PATH

          mkdir -p build && cd build

          curl -L -o bash-5.2.tar.gz https://ftp.gnu.org/gnu/bash/bash-5.2.tar.gz
          tar -xf bash-5.2.tar.gz
          cd bash-5.2

          # Apply patch to complete.c
          cp complete.c complete.c.orig
          patch -p0 < ../../android-bash.patch

          # Configure
          ./configure \
            --host=$HOST \
            --disable-shared \
            --enable-static-link \
            --enable-readline \
            --with-installed-readline=$(pwd)/../../deps/readline-8.2/install \
            --with-curses \
            --prefix=/system \
            --disable-werror \
            --without-bash-malloc \
            ac_cv_func_setpwent=no \
            ac_cv_func_getpwent=no \
            ac_cv_func_endpwent=no \
            CPPFLAGS="-D_GNU_SOURCE" \
            CC="$TOOLCHAIN_PATH/bin/${TOOLCHAIN}-clang" \
            AR="$TOOLCHAIN_PATH/bin/llvm-ar" \
            RANLIB="$TOOLCHAIN_PATH/bin/llvm-ranlib" \
            CFLAGS="-static -Os -fPIE -Wno-parentheses -Wno-deprecated-non-prototype -Wno-unused-command-line-argument" \
            LDFLAGS="-static -s -fPIE -L$(pwd)/../../deps/readline-8.2/install/lib -L$(pwd)/../../deps/ncurses-6.4/install/lib" \
            LIBS="-lreadline -lncursesw -ltinfo"

          make -j$(nproc) bash
          $TOOLCHAIN_PATH/bin/llvm-strip --strip-all bash
          cp bash ../../bash-static-$ARCH
          cd ../..

      - name: Test binary
        run: |
          chmod +x bash-static-${{ matrix.arch }}
          file bash-static-${{ matrix.arch }}
          ls -lh bash-static-${{ matrix.arch }}
          ./bash-static-${{ matrix.arch }} --version

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: bash-static-${{ matrix.arch }}
          path: bash-static-${{ matrix.arch }}

      - name: Create Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v1
        with:
          files: bash-static-${{ matrix.arch }}
          draft: false
