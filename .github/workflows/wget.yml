name: Generate APK Signing Keystore

on:
  # 手动触发
  workflow_dispatch:
    inputs:
      alias:
        description: '密钥别名'
        required: false
        default: 'admin'
      password:
        description: '密钥密码'
        required: false
        default: 'admin'

jobs:
  create-keystore:
    runs-on: ubuntu-latest

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置Java环境
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: 创建签名密钥库
        env:
          ALIAS: ${{ github.event.inputs.alias }}
          PASSWORD: ${{ github.event.inputs.password }}
        run: |
          echo "开始创建APK签名密钥库..."
          echo "别名: $ALIAS"
          echo "密码: $PASSWORD"
          echo "有效期: 36500天 (约100年)"
          echo "国家: CN (中国)"
          echo ""

          # 计算100年的天数
          VALIDITY_DAYS=36500

          # 创建密钥库
          keytool -genkeypair \
            -alias "$ALIAS" \
            -keyalg RSA \
            -keysize 2048 \
            -validity $VALIDITY_DAYS \
            -keystore release-keystore.jks \
            -dname "CN=$ALIAS, C=CN" \
            -storepass "$PASSWORD" \
            -keypass "$PASSWORD" \
            -storetype JKS

          echo "✅ 密钥库创建成功"

          # 验证密钥库
          echo ""
          echo "🔍 验证密钥库信息："
          keytool -list -v \
            -keystore release-keystore.jks \
            -storepass "$PASSWORD" 2>/dev/null | \
            grep -E "别名|Alias name:|有效期|Valid|指纹|Fingerprint" || true

          # 创建证书文件
          keytool -exportcert \
            -alias "$ALIAS" \
            -keystore release-keystore.jks \
            -storepass "$PASSWORD" \
            -rfc \
            -file certificate.pem

          echo ""
          echo "📄 证书已导出为 certificate.pem"

      - name: 创建配置说明文件
        env:
          ALIAS: ${{ github.event.inputs.alias }}
          PASSWORD: ${{ github.event.inputs.password }}
        run: |
          cat > README-SIGNING.md << 'EOF'
          # APK签名密钥库信息

          ## 基本信息
          - **密钥库文件**: release-keystore.jks
          - **别名**: $ALIAS
          - **密码**: $PASSWORD
          - **算法**: RSA 2048
          - **有效期**: 100年 (36500天)
          - **国家**: CN (中国)

          ## Android项目配置

          ### 1. 在项目根目录创建 `keystore.properties` 文件：
          ```properties
          storePassword=$PASSWORD
          keyPassword=$PASSWORD
          keyAlias=$ALIAS
          storeFile=release-keystore.jks
          ```

          ### 2. 在 `app/build.gradle` 中添加：
          ```gradle
          // 加载签名配置
          def keystorePropertiesFile = rootProject.file("keystore.properties")
          def keystoreProperties = new Properties()
          keystoreProperties.load(new FileInputStream(keystorePropertiesFile))

          android {
              signingConfigs {
                  release {
                      storeFile file(keystoreProperties['storeFile'])
                      storePassword keystoreProperties['storePassword']
                      keyAlias keystoreProperties['keyAlias']
                      keyPassword keystoreProperties['keyPassword']
                  }
              }

              buildTypes {
                  release {
                      signingConfig signingConfigs.release
                      minifyEnabled true
                      proguardFiles getDefaultProguardFile('proguard-android-optimize.txt'), 'proguard-rules.pro'
                  }
                  debug {
                      signingConfig signingConfigs.release
                  }
              }
          }
          ```

          ### 3. 在 `app/build.gradle` 的 `android` 块中添加：
          ```gradle
          android {
              // ... 其他配置

              signingConfigs {
                  release {
                      storeFile file("release-keystore.jks")
                      storePassword "$PASSWORD"
                      keyAlias "$ALIAS"
                      keyPassword "$PASSWORD"
                  }
              }

              buildTypes {
                  release {
                      signingConfig signingConfigs.release
                  }
              }
          }
          ```

          ## 手动签名APK命令

          ```bash
          # 使用apksigner进行V1+V2+V3签名
          apksigner sign \
            --ks release-keystore.jks \
            --ks-key-alias $ALIAS \
            --ks-pass pass:$PASSWORD \
            --key-pass pass:$PASSWORD \
            --v1-signing-enabled true \
            --v2-signing-enabled true \
            --v3-signing-enabled true \
            --out app-signed.apk \
            app-unsigned.apk

          # 验证签名
          apksigner verify -v app-signed.apk
          ```

          ## ⚠️ 安全警告

          1. **立即备份**: 下载后立即将密钥库文件备份到安全位置
          2. **不要提交**: 不要将密钥库文件提交到版本控制系统
          3. **密码保密**: 不要与他人分享密码
          4. **唯一性**: 每个应用应该使用不同的签名密钥

          ## 🔑 证书指纹

          使用以下命令查看证书指纹：
          ```bash
          keytool -list -v \
            -keystore release-keystore.jks \
            -storepass $PASSWORD
          ```

          EOF

          echo "📋 配置说明文件已创建"

      - name: 上传构建产物
        uses: actions/upload-artifact@v4
        with:
          name: apk-signing-keystore
          path: |
            release-keystore.jks
            certificate.pem
            README-SIGNING.md
          retention-days: 1

      - name: 显示完成信息
        env:
          ALIAS: ${{ github.event.inputs.alias }}
          PASSWORD: ${{ github.event.inputs.password }}
        run: |
          echo ""
          echo "🎉 APK签名密钥库创建完成！"
          echo ""
          echo "📋 总结信息："
          echo "   密钥库文件: release-keystore.jks"
          echo "   别名: $ALIAS"
          echo "   密码: $PASSWORD"
          echo "   有效期: 100年 (36500天)"
          echo "   国家: CN (中国)"
          echo "   算法: RSA 2048"
          echo ""
          echo "📥 下一步："
          echo "   1. 在GitHub Actions页面下载构建产物"
          echo "   2. 将release-keystore.jks文件保存到安全位置"
          echo "   3. 按照README-SIGNING.md配置你的Android项目"
          echo "   4. 开始签名你的APK应用"
          echo ""
          echo "⚠️ 重要提醒："
          echo "   - 下载后立即备份密钥库文件"
          echo "   - 不要提交密钥库文件到Git仓库"
          echo "   - 妥善保管密码，丢失无法找回"
