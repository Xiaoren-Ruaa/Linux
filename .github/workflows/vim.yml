name: Build Hardcoded Full-Featured Vim

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Install Toolchain
        run: sudo apt-get update && sudo apt-get install -y gcc-aarch64-linux-gnu binutils-aarch64-linux-gnu make git wget

      - name: Build Ncurses (Static)
        run: |
          wget https://invisible-mirror.net/archives/ncurses/ncurses-6.5.tar.gz
          tar -xf ncurses-6.5.tar.gz
          cd ncurses-6.5
          ./configure --host=aarch64-linux-gnu --with-shared=no --enable-static --enable-widec --without-debug CPPFLAGS="-P"
          make -j$(nproc)
          mkdir -p ../dist/lib ../dist/include/ncursesw
          cp lib/libncursesw.a ../dist/lib/
          cp include/*.h ../dist/include/ncursesw/
          cp include/*.h ../dist/include/

      - name: Build Vim (Hardcoded Runtime Path)
        run: |
          git clone --depth 1 https://github.com/vim/vim.git
          cd vim/src
          # 【核心黑科技】将默认 Runtime 路径永久修改为手机上的 /data/local/tmp/runtime
          sed -i 's|/usr/local/share/vim|/data/local/tmp|g' os_unix.h
          
          ./configure --host=aarch64-linux-gnu \
                      CC=aarch64-linux-gnu-gcc \
                      --with-tlib=ncursesw --enable-gui=no \
                      --with-features=huge \
                      --enable-multibyte \
                      cross_compiling=yes \
                      ac_cv_sizeof_int=4 ac_cv_sizeof_long=8 ac_cv_sizeof_off_t=8 ac_cv_sizeof_voidp=8 \
                      CPPFLAGS="-I$(pwd)/../../dist/include -I$(pwd)/../../dist/include/ncursesw" \
                      LDFLAGS="-static -L$(pwd)/../../dist/lib" \
                      LIBS="-lncursesw"
          make -j$(nproc)
          aarch64-linux-gnu-strip vim

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: vim-hardcoded-bundle
          path: |
            vim/src/vim
            vim/runtime/
