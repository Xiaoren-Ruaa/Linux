name: Build Static tar and find (ARM64)

on:
  workflow_dispatch:

jobs:
  build:
    name: Cross-compile tar & find (ARM64)
    runs-on: ubuntu-latest

    steps:
      - name: Install cross-compilation toolchain
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu binutils-aarch64-linux-gnu autoconf automake wget file

      - name: Compile static tar (ARM64)
        run: |
          TAR_VERSION="1.35"
          wget https://ftp.gnu.org/gnu/tar/tar-${TAR_VERSION}.tar.gz
          tar xzf tar-${TAR_VERSION}.tar.gz
          cd tar-${TAR_VERSION}

          # 修复 Bionic 类型不匹配补丁 (修正版，适配 tar-1.35)
          cat > fix-ialloc.patch << 'EOF'
          --- a/gnu/ialloc.h
          +++ b/gnu/ialloc.h
          @@ -102,9 +102,9 @@
           _GL_INLINE void *
           imalloc (idx_t s)
           {
          -  return s <= SIZE_MAX ? malloc (s) : _gl_alloc_nomem ();
          +  return s <= SIZE_MAX ? (void *) malloc (s) : (void *) _gl_alloc_nomem ();
           }
           
           _GL_INLINE void *
           irealloc (void *p, idx_t s)
           {
          -  return s <= SIZE_MAX ? realloc (p, s | !s) : _gl_alloc_nomem ();
          +  return s <= SIZE_MAX ? (void *) realloc (p, s | !s) : (void *) _gl_alloc_nomem ();
           }
          EOF
          
          patch -p1 < fix-ialloc.patch || { echo "Patch failed, checking if already patched..."; grep -q "(void \*) malloc" gnu/ialloc.h && echo "Already patched, continuing." || exit 1; }

          # 配置、编译、验证、瘦身
          ./configure --host=aarch64-linux-gnu \
                      CC=aarch64-linux-gnu-gcc \
                      CFLAGS="-static -O2" \
                      LDFLAGS="-static -all-static" \
                      --prefix=/usr
          make -j$(nproc)
          aarch64-linux-gnu-strip src/tar
          file src/tar | grep 'statically linked' || { echo "Error: tar is not static"; exit 1; }
          cp src/tar $GITHUB_WORKSPACE/tar-static-arm64

      - name: Compile static find (ARM64)
        run: |
          FIND_VERSION="4.10.0"
          wget https://ftp.gnu.org/gnu/findutils/findutils-${FIND_VERSION}.tar.xz
          tar xJf findutils-${FIND_VERSION}.tar.xz
          cd findutils-${FIND_VERSION}

          # 配置、编译、验证、瘦身
          ./configure --host=aarch64-linux-gnu \
                      CC=aarch64-linux-gnu-gcc \
                      CFLAGS="-static -O2" \
                      LDFLAGS="-static -all-static" \
                      --prefix=/usr
          make -j$(nproc)
          aarch64-linux-gnu-strip find/find
          file find/find | grep 'statically linked' || { echo "Error: find is not static"; exit 1; }
          cp find/find $GITHUB_WORKSPACE/find-static-arm64

      - name: Upload tar artifact
        uses: actions/upload-artifact@v4
        with:
          name: tar-static-arm64
          path: ./tar-static-arm64
          retention-days: 90

      - name: Upload find artifact
        uses: actions/upload-artifact@v4
        with:
          name: find-static-arm64
          path: ./find-static-arm64
          retention-days: 90
