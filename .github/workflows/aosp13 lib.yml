name: Build Android 13 Shared Libs (Final-Absolute)

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout util-linux
        uses: actions/checkout@v4
        with:
          repository: util-linux/util-linux
          fetch-depth: 1

      - name: Install Build Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y gettext bison flex autopoint build-essential pkg-config libtool autoconf automake

      - name: Build Core Libraries
        run: |
          ./autogen.sh
          
          export TOOLCHAIN=$ANDROID_NDK_LATEST_HOME/toolchains/llvm/prebuilt/linux-x86_64
          export TARGET=aarch64-linux-android33
          export CC=$TOOLCHAIN/bin/$TARGET-clang
          export AR=$TOOLCHAIN/bin/llvm-ar
          export STRIP=$TOOLCHAIN/bin/llvm-strip

          # --- 核心攻克：暴力补丁集 ---
          
          # 1. 修复 shell 缺失
          sed -i '1i void setusershell(void) {}' lib/shells.c
          sed -i '1i void endusershell(void) {}' lib/shells.c
          sed -i '1i char *getusershell(void) { return 0; }' lib/shells.c

          # 2. 修复 versionsort 和 scandirat 类型冲突 (解决图 1000003241 报错)
          # 我们定义一个兼容 Android 的 versionsort，并强制转换 scandirat 的参数类型
          cat <<EOF > android_fix.h
          #include <dirent.h>
          #include <string.h>
          #include <sys/types.h>
          int versionsort(const struct dirent **a, const struct dirent **b) {
              return strverscmp((*a)->d_name, (*b)->d_name);
          }
          #define scandirat(fd, dir, namelist, filter, compar) \
              scandirat(fd, dir, namelist, (int (*)(const struct dirent *))filter, \
              (int (*)(const struct dirent **, const struct dirent **))compar)
          EOF

          # 将补丁注入到报错的核心文件顶端
          sed -i '1i #include "android_fix.h"' libmount/src/tab_parse.c

          # 配置参数：禁用所有不兼容的边缘程序，专注核心库
          ./configure --host=aarch64-linux-android \
                      --prefix=/system \
                      --enable-shared \
                      --disable-static \
                      --disable-all-programs \
                      --enable-libuuid \
                      --enable-libblkid \
                      --enable-libmount \
                      --enable-libsmartcols \
                      --disable-bash-completion \
                      --disable-pylibmount \
                      --without-python \
                      --without-systemd \
                      --without-udev \
                      --without-ncurses \
                      --without-selinux \
                      --disable-widechar \
                      --disable-use-tty-group \
                      --disable-makeinstall-chown \
                      --disable-chfn-chsh \
                      --disable-login \
                      --disable-su \
                      --disable-runuser \
                      --disable-newgrp

          make -j$(nproc)
          
          # 整理产物
          mkdir -p output/lib64
          mkdir -p output/pkgconfig
          cp -d .libs/libmount.so* output/lib64/
          cp -d .libs/libblkid.so* output/lib64/
          cp -d .libs/libuuid.so* output/lib64/
          cp -d .libs/libsmartcols.so* output/lib64/
          cp libmount/libmount.pc output/pkgconfig/
          cp libblkid/libblkid.pc output/pkgconfig/
          cp uuid/libuuid.pc output/pkgconfig/
          
          find output/lib64/ -type f -name "*.so*" -exec $STRIP --strip-unneeded {} +

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: android13-libs-bundle
          path: output/
