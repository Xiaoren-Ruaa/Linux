name: Build All Four Core Libs (Full Fix v8)

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout util-linux
        uses: actions/checkout@v4
        with:
          repository: util-linux/util-linux
          fetch-depth: 1

      - name: Install Build Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y gettext bison flex autopoint build-essential pkg-config libtool autoconf automake

      - name: Build Core Libraries
        run: |
          ./autogen.sh
          
          export TOOLCHAIN=$ANDROID_NDK_LATEST_HOME/toolchains/llvm/prebuilt/linux-x86_64
          export TARGET=aarch64-linux-android33
          export CC=$TOOLCHAIN/bin/$TARGET-clang
          export STRIP=$TOOLCHAIN/bin/llvm-strip

          # --- 1. 修复源码中的硬伤，但不干扰 configure ---
          # 修复 versionsort (图 3447)
          sed -i 's/versionsort/alphasort/g' libmount/src/tab_parse.c
          
          # 为 shells.c 增加缺失的头文件引用，防止隐式声明冲突
          sed -i '1i #include <stdio.h>\n#include <string.h>' lib/shells.c

          # --- 2. 核心补丁：直接注入 libcommon (所有库都会链接它) ---
          # 这样可以确保 strverscmp 符号被包含在最终的 .so 中
          cat <<EOF >> lib/strutils.c
          #include <string.h>
          int strverscmp(const char *s1, const char *s2) { return strcmp(s1, s2); }
          void setusershell(void) {}
          void endusershell(void) {}
          char *getusershell(void) { return NULL; }
          EOF

          # --- 3. 配置与编译 ---
          # 移除之前的 -include 参数，改回干净的 CFLAGS
          export CFLAGS="-Wno-implicit-function-declaration -Wno-int-conversion"
          export LDFLAGS="-Wl,-rpath=/system/lib64 -Wl,--dynamic-linker=/system/bin/linker64 -Wl,--allow-shlib-undefined"

          ./configure --host=aarch64-linux-android \
                      --prefix=/system \
                      --enable-shared \
                      --disable-static \
                      --disable-all-programs \
                      --enable-libuuid \
                      --enable-libblkid \
                      --enable-libmount \
                      --enable-libsmartcols \
                      --disable-bash-completion \
                      --without-python \
                      --without-udev \
                      --without-ncurses \
                      --disable-libmount-mountfd-support \
                      --disable-monitor-fanotify

          # 强制重新生成相关的 C 文件
          make -j$(nproc)

          # --- 4. 产物提取与版本伪装 ---
          mkdir -p output/lib64
          for lib in uuid blkid mount smartcols; do
            # 拷贝 .so 实体
            cp .libs/lib${lib}.so output/lib64/lib${lib}.so
            # 建立手机系统寻找的特定软链接
            ln -sf lib${lib}.so output/lib64/lib${lib}.so.1
          done
          
          # 提取新编译的 lsblk
          cp .libs/lsblk output/
          
          # 瘦身处理
          find output/lib64/ -type f -name "*.so" -exec $STRIP --strip-unneeded {} +
          $STRIP output/lsblk

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: util-linux-libs-v8-final
          path: output/
