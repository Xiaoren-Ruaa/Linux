name: Build AOSP13 Core System Libs

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout util-linux
        uses: actions/checkout@v4
        with:
          repository: util-linux/util-linux
          fetch-depth: 1

      - name: Install Build Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y gettext bison flex autopoint build-essential pkg-config libtool autoconf automake

      - name: Inject Compatibility Symbols
        run: |
          # 1. 禁用符号版本脚本，防止图 3460 的链接强制约束错误
          find . -name "*.sym" -exec truncate -s 0 {} +
          
          # 2. 修复 versionsort 缺失 (图 3447)
          sed -i 's/versionsort/alphasort/g' libmount/src/tab_parse.c

          # 3. 核心：在 lib/strutils.c 中手动植入 strverscmp 实现 (修复图 3454)
          # 这样编译出的每个 .so 都会自带这个符号，不再依赖系统 Bionic
          cat <<EOF >> lib/strutils.c
          #include <string.h>
          #include <ctype.h>
          int strverscmp(const char *s1, const char *s2) {
              const unsigned char *p1 = (const unsigned char *) s1;
              const unsigned char *p2 = (const unsigned char *) s2;
              unsigned char c1, c2;
              while ((c1 = *p1++) == (c2 = *p2++) && c1 != '\0');
              if (c1 == '\0' && c2 == '\0') return 0;
              return c1 - c2; 
          }
          // 同时补全图 3446/3452 缺失的 shell 存根
          void setusershell(void) {}
          void endusershell(void) {}
          char *getusershell(void) { return (char *)0; }
          EOF

          # 4. 物理移除 monitor_fanotify 依赖 (修复图 3459)
          echo "int mnt_monitor_enable_fanotify(void *mn, int e) { return -1; }" > libmount/src/monitor_fanotify.c
          echo "int mnt_monitor_get_fanotify_fd(void *mn) { return -1; }" >> libmount/src/monitor_fanotify.c

      - name: Build Libraries
        run: |
          ./autogen.sh
          
          export TOOLCHAIN=$ANDROID_NDK_LATEST_HOME/toolchains/llvm/prebuilt/linux-x86_64
          export TARGET=aarch64-linux-android33
          export CC=$TOOLCHAIN/bin/$TARGET-clang
          export STRIP=$TOOLCHAIN/bin/llvm-strip

          export CFLAGS="-Wno-implicit-function-declaration -Wno-int-conversion"
          # 强制链接参数，确保库可以独立运行
          export LDFLAGS="-Wl,-rpath=/system/lib64 -Wl,--allow-shlib-undefined -Wl,--undefined-version"

          ./configure --host=aarch64-linux-android \
                      --prefix=/system \
                      --enable-shared \
                      --disable-static \
                      --disable-all-programs \
                      --enable-libuuid \
                      --enable-libblkid \
                      --enable-libmount \
                      --enable-libsmartcols \
                      --without-python \
                      --without-udev \
                      --without-ncurses \
                      --disable-libmount-mountfd-support \
                      --disable-monitor-fanotify

          # 移除 Makefile 中干扰链接的符号脚本参数
          find . -name "Makefile" -exec sed -i 's/--version-script//g' {} +

          # 只编译库目标
          make -j$(nproc) libuuid.la libblkid.la libmount.la libsmartcols.la

          # --- 提取产物 ---
          mkdir -p output/lib64
          for lib in uuid blkid mount smartcols; do
            cp .libs/lib${lib}.so output/lib64/
            # 建立系统需要的软链接
            ln -sf lib${lib}.so output/lib64/lib${lib}.so.1
          done
          
          find output/lib64/ -type f -name "*.so" -exec $STRIP --strip-unneeded {} +

      - name: Upload Libraries
        uses: actions/upload-artifact@v4
        with:
          name: util-linux-libs-only-v12
          path: output/
