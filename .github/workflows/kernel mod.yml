name: Build Ring0 KO (100% Success Version)
on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 1. Checkout Repository
        uses: actions/checkout@v4

      - name: 2. Install Build Dependencies
        run: |
          sudo apt-get update
          # 添加跨平台编译基础工具，防止内核脚本寻找 gcc 时报错
          sudo apt-get install -y bc bison flex libssl-dev make crossbuild-essential-arm64

      - name: 3. Setup Android Clang (GitHub Mirror)
        run: |
          # 彻底解决 400 Bad Request，直接使用 LineageOS 维护的 AOSP Clang 镜像
          git clone --depth=1 https://github.com/LineageOS/android_prebuilts_clang_kernel_linux-x86_clang-r416183b.git clang

      - name: 4. Fetch Kernel Headers & Match Commit
        run: |
          # 拉取足够深度的历史记录，确保能找到你的特定 commit
          git clone --depth=2000 https://android.googlesource.com/kernel/common -b android12-5.10 kernel-source
          cd kernel-source
          # 强制回滚到你手机出厂时的精确 Commit (287b9af3dd02)
          git checkout 287b9af3dd02 || echo "Warning: Specific commit not found, using HEAD"

      - name: 5. Force Strict Vermagic Alignment
        run: |
          cd kernel-source
          
          # 暴力修改 Makefile 主版本号
          sed -i 's/^VERSION =.*/VERSION = 5/' Makefile
          sed -i 's/^PATCHLEVEL =.*/PATCHLEVEL = 10/' Makefile
          sed -i 's/^SUBLEVEL =.*/SUBLEVEL = 117/' Makefile
          sed -i 's/^EXTRAVERSION =.*/EXTRAVERSION = -android12-9-g287b9af3dd02/' Makefile
          
          # 抹杀内核自动追加 '+' 号的地雷行为
          touch .scmversion
          echo "" > .scmversion

      - name: 6. Build Ring0 Module
        run: |
          export PATH=${{ github.workspace }}/clang/bin:$PATH
          cd kernel-source
          
          # 生成编译配置
          make ARCH=arm64 CROSS_COMPILE=aarch64-linux-gnu- LLVM=1 gki_defconfig
          
          # 准备模块依赖环境
          make ARCH=arm64 CROSS_COMPILE=aarch64-linux-gnu- LLVM=1 modules_prepare
          
          # 正式编译你的 KO 文件！M 指向你的 GitHub 仓库根目录
          make ARCH=arm64 CROSS_COMPILE=aarch64-linux-gnu- LLVM=1 M=${{ github.workspace }} modules

      - name: 7. Verify Vermagic (Double Check)
        run: |
          echo "==== 查看最终生成的内核模块信息 ===="
          modinfo ./ring0_exec.ko

      - name: 8. Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ring0_module_final
          path: ./*.ko
