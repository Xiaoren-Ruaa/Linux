name: Build NDK-Native lsblk

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout util-linux
        uses: actions/checkout@v4
        with:
          repository: util-linux/util-linux
          fetch-depth: 1

      - name: Install Build Tools
        run: |
          sudo apt-get update
          sudo apt-get install -y autoconf automake libtool pkg-config bison flex gettext autopoint

      - name: Set up NDK
        uses: nttld/setup-ndk@v1
        with:
          ndk-version: r26b

      - name: Patch NDK Compatibility
        run: |
          # 1. 修复 getusershell/setusershell 编译 (图 3446, 3452)
          # 在 lib/shells.c 头部增加完整的存根定义
          sed -i '1i #define getusershell() (NULL)\n#define setusershell() ((void)0)\n#define endusershell() ((void)0)' lib/shells.c
          
          # 2. 修复 versionsort 缺失 (图 3447)
          sed -i 's/versionsort/alphasort/g' libmount/src/tab_parse.c

          # 3. 修复 fanotify 链接错误 (图 3450)
          cat <<EOF > libmount/src/monitor_fanotify.c
          #include <stdlib.h>
          int mnt_monitor_enable_fanotify(struct libmnt_monitor *mn, int enable) {
              return -1; 
          }
          EOF

      - name: Configure and Build
        run: |
          ./autogen.sh
          
          export TOOLCHAIN=$ANDROID_NDK_HOME/toolchains/llvm/prebuilt/linux-x86_64
          export TARGET=aarch64-linux-android
          export API=29
          
          export CC=$TOOLCHAIN/bin/${TARGET}${API}-clang
          # 关键修改：加入 -Wl,--allow-shlib-undefined 以解决图 3452 的链接封锁
          export LDFLAGS="-Wl,-rpath=/system/lib64 -Wl,--dynamic-linker=/system/bin/linker64 -Wl,--allow-shlib-undefined"
          
          # 彻底禁用可能导致报错的第三方库检测
          export NCURSES_CFLAGS=" "
          export NCURSES_LIBS=" "

          ./configure \
            --host=$TARGET \
            --disable-all-programs \
            --enable-lsblk \
            --enable-libblkid \
            --enable-libmount \
            --enable-libsmartcols \
            --enable-shared \
            --disable-static \
            --without-udev \
            --without-ncurses \
            --without-ncursesw \
            --without-tinfo \
            --without-readline \
            --without-python \
            --disable-bash-completion \
            --disable-nls \
            --disable-widechar \
            --disable-libmount-mountfd-support \
            --disable-monitor-fanotify

          # 执行编译
          make lsblk -j$(nproc)
          
          # 提取真正的二进制文件并重命名为 lsblk
          cp .libs/lsblk lsblk
          $TOOLCHAIN/bin/llvm-strip lsblk

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: lsblk-ndk-v5
          path: lsblk
