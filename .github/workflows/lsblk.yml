name: Build NDK-Native lsblk (Final Fix v2)

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout util-linux
        uses: actions/checkout@v4
        with:
          repository: util-linux/util-linux
          fetch-depth: 1

      - name: Install Build Tools
        run: |
          sudo apt-get update
          sudo apt-get install -y autoconf automake libtool pkg-config bison flex gettext autopoint

      - name: Set up NDK
        uses: nttld/setup-ndk@v1
        with:
          ndk-version: r26b

      - name: Patch NDK Compatibility
        run: |
          # 1. 修复 getusershell/endusershell (图 3446 报错)
          sed -i '1i #define getusershell() (NULL)\n#define endusershell() ((void)0)' lib/shells.c
          
          # 2. 修复 versionsort 缺失 (图 3447 报错)
          sed -i 's/versionsort/alphasort/g' libmount/src/tab_parse.c

          # 3. 强力修复 sys/fanotify.h 缺失 (图 3448, 3449 报错)
          # 直接清空该文件内容，使其变成一个空的编译单元，从而绕过头文件检查
          echo "/* patched */" > libmount/src/monitor_fanotify.c

      - name: Configure and Build
        run: |
          ./autogen.sh
          
          export TOOLCHAIN=$ANDROID_NDK_HOME/toolchains/llvm/prebuilt/linux-x86_64
          export TARGET=aarch64-linux-android
          export API=29
          
          export CC=$TOOLCHAIN/bin/${TARGET}${API}-clang
          export CFLAGS="-Wno-implicit-function-declaration -Wno-int-conversion"
          export LDFLAGS="-Wl,-rpath=/system/lib64 -Wl,--dynamic-linker=/system/bin/linker64"

          ./configure \
            --host=$TARGET \
            --disable-all-programs \
            --enable-lsblk \
            --enable-libblkid \
            --enable-libmount \
            --enable-libsmartcols \
            --enable-shared \
            --disable-static \
            --without-udev \
            --without-ncurses \
            --without-python \
            --disable-bash-completion \
            --disable-nls \
            --disable-widechar \
            --disable-libmount-mountfd-support \
            --disable-monitor-fanotify

          # 编译
          make lsblk -j$(nproc)
          
          # 提取 ELF 真身并重命名为 lsblk
          cp .libs/lsblk lsblk
          $TOOLCHAIN/bin/llvm-strip lsblk

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: lsblk-ndk-v2
          path: lsblk
