name: Build Dynamic lsblk for /system/lib64

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout util-linux
        uses: actions/checkout@v4
        with:
          repository: util-linux/util-linux
          fetch-depth: 1

      - name: Install Build Tools
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            autoconf automake libtool pkg-config bison flex gettext autopoint \
            gcc-aarch64-linux-gnu

      - name: Configure and Build
        run: |
          ./autogen.sh
          
          export CC=aarch64-linux-gnu-gcc
          # 强制链接到 Android 的动态链接器，并设置库搜索路径
          export LDFLAGS="-Wl,-rpath=/system/lib64 -Wl,--dynamic-linker=/system/bin/linker64"

          ./configure \
            --host=aarch64-linux-gnu \
            --disable-all-programs \
            --enable-lsblk \
            --enable-libblkid \
            --enable-libmount \
            --enable-libsmartcols \
            --enable-shared \
            --disable-static \
            --without-udev \
            --without-ncurses \
            --without-ncursesw \
            --without-tinfo \
            --without-readline \
            --without-python \
            --without-cap-ng \
            --disable-bash-completion \
            --disable-nls \
            --disable-widechar

          # 编译库和程序
          make libblkid.la libmount.la libsmartcols.la -j$(nproc)
          make lsblk -j$(nproc)
          
          # 【关键修正】从 .libs 目录提取真正的二进制文件
          cp .libs/lsblk lsblk_real
          
          # 使用交叉编译工具链的 strip 进行瘦身
          aarch64-linux-gnu-strip lsblk_real

      - name: Check Linkage
        run: |
          # 验证是否正确动态链接到了你那三个库
          aarch64-linux-gnu-readelf -d lsblk_real | grep NEEDED

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: lsblk-android-dynamic
          path: lsblk_real
