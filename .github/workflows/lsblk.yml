name: Build Static lsblk

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - arch: aarch64
            gcc_pkg: gcc-aarch64-linux-gnu
            host_triplet: aarch64-linux-gnu
          - arch: x86_64
            gcc_pkg: gcc
            host_triplet: x86_64-linux-gnu

    steps:
      - name: Checkout util-linux
        uses: actions/checkout@v4
        with:
          repository: util-linux/util-linux
          fetch-depth: 1

      - name: Install Build Tools
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            autoconf \
            automake \
            libtool \
            pkg-config \
            bison \
            flex \
            gettext \
            autopoint \
            ${{ matrix.gcc_pkg }}

      - name: Configure and Build
        run: |
          ./autogen.sh
          
          # 设置编译器
          if [ "${{ matrix.arch }}" = "aarch64" ]; then
            export CC=aarch64-linux-gnu-gcc
          else
            export CC=gcc
          fi

          # 针对 Android /system/bin 优化的全静态配置
          ./configure \
            --host=${{ matrix.host_triplet }} \
            LDFLAGS="-static" \
            --disable-all-programs \
            --enable-lsblk \
            --enable-static-programs=lsblk \
            --without-udev \
            --without-ncurses \
            --without-python \
            --without-tinfo \
            --without-cap-ng \
            --without-libz \
            --without-libmagic \
            --disable-bash-completion \
            --disable-nls

          make lsblk -j$(nproc)
          
          # 移除符号表减小体积
          if [ "${{ matrix.arch }}" = "aarch64" ]; then
            aarch64-linux-gnu-strip lsblk
          else
            strip lsblk
          fi

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: lsblk-${{ matrix.arch }}
          path: lsblk
