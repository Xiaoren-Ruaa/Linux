name: Build Custom Dynamic lsblk

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout util-linux
        uses: actions/checkout@v4
        with:
          repository: util-linux/util-linux
          fetch-depth: 1

      - name: Install Build Tools
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            autoconf automake libtool pkg-config bison flex gettext autopoint \
            gcc-aarch64-linux-gnu

      - name: Configure and Build
        run: |
          ./autogen.sh
          
          export CC=aarch64-linux-gnu-gcc
          # 核心链接参数：
          # 1. -Wl,-rpath 指定运行时库搜索路径
          # 2. --dynamic-linker 指定 Android 64位链接器路径
          export LDFLAGS="-Wl,-rpath=/system/lib64 -Wl,--dynamic-linker=/system/bin/linker64"

          ./configure \
            --host=aarch64-linux-gnu \
            --disable-all-programs \
            --enable-lsblk \
            --enable-shared \
            --disable-static \
            --without-udev \
            --without-ncurses \
            --without-ncursesw \
            --without-tinfo \
            --without-readline \
            --without-python \
            --without-cap-ng \
            --without-libz \
            --without-libmagic \
            --disable-bash-completion \
            --disable-nls \
            --disable-widechar

          # 只编译 lsblk
          make lsblk -j$(nproc)
          
          # 移除调试符号，确保体积最小
          aarch64-linux-gnu-strip lsblk

      - name: Check Dependencies
        run: |
          # 验证生成的文件是否只依赖了你想要的那三个库
          aarch64-linux-gnu-readelf -d lsblk | grep NEEDED

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: lsblk-custom-dynamic
          path: lsblk
