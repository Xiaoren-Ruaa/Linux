name: Unpack DTBO Image

on:
  workflow_dispatch:
    inputs:
      img_name:
        description: '镜像文件名'
        required: true
        default: 'dtbo.img'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install System Tools
        run: |
          sudo apt-get update
          sudo apt-get install -y device-tree-compiler

      - name: Universal Unpack
        run: |
          mkdir -p output/dtb
          IMG="${{ github.event.inputs.img_name }}"
          
          # 使用 grep 定位所有 DTB 头部特征码 0xd00dfeed
          # 这种方法不依赖任何厂商工具，适配所有 Android DTBO
          grep -aob $'\xd0\x0d\xfe\xed' "$IMG" | cut -d: -f1 > offsets.txt
          
          count=0
          while read -r offset; do
            # 计算当前块的大小并切分
            next_offset=$(grep -A1 "$offset" offsets.txt | tail -n 1)
            if [ "$offset" == "$next_offset" ]; then
                dd if="$IMG" of=output/dtb/content.$count bs=1 skip="$offset" status=none
            else
                size=$((next_offset - offset))
                dd if="$IMG" of=output/dtb/content.$count bs=1 skip="$offset" count=$size status=none
            fi
            count=$((count + 1))
          done < offsets.txt

      - name: Batch Decompile
        run: |
          mkdir -p output/dts
          for f in output/dtb/content.*; do
            dtc -I dtb -O dts "$f" -o "output/dts/$(basename "$f").dts" 2>/dev/null || true
          done

      - name: Generate Summary
        run: |
          echo "搜索结果：" > output/summary.txt
          grep -rnE "panel|framerate|brightness" output/dts/ >> output/summary.txt || true

      - uses: actions/upload-artifact@v4
        with:
          name: DTBO-Decompiled
          path: output/
