name: DTBO unpack

on:
  workflow_dispatch:
    inputs:
      img_name:
        description: '上传的文件名 (如 dtbo.img)'
        required: true
        default: 'dtbo.img'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Environment Setup
        run: |
          sudo apt-get update
          sudo apt-get install -y device-tree-compiler gcc make python3 git

      - name: Build Global mkdtimg Tool
        run: |
          # 直接从 AOSP 源码编译最新版 mkdtimg，确保适配所有厂商标准格式
          git clone https://android.googlesource.com/platform/system/libufdt --depth 1
          cd libufdt/utils/src/
          gcc mkdtimg.c dtbo_format.c -o ../../../mkdtimg
          cd ../../../
          chmod +x mkdtimg

      - name: Universal Unpack Logic
        run: |
          mkdir -p output/dtb
          IMG="${{ github.event.inputs.img_name }}"
          
          echo ">>> 尝试标准 Android DTBO 格式解包..."
          if ./mkdtimg dump "$IMG" -b output/dtb/content; then
            echo "标准解包成功。"
          else
            echo "标准解包失败，启动暴力切分逻辑 (适配非标/加密厂商)..."
            # 寻找 DTB 魔数 0xd00dfeed 并手动切割
            grep -aob $'\xd0\x0d\xfe\xed' "$IMG" | cut -d: -f1 > offsets.txt
            count=0
            while read -r offset; do
              dd if="$IMG" of=output/dtb/content.$count bs=1 skip="$offset" status=none
              count=$((count + 1))
            done < offsets.txt
          fi

      - name: Recursive Decompile
        run: |
          mkdir -p output/dts
          # 遍历所有提取出的二进制块
          find output/dtb -type f | while read -r dtb_file; do
            idx=$(basename "$dtb_file" | sed 's/content.//')
            echo "正在处理节点: $idx"
            # 尝试反编译，忽略非 DTB 数据块带来的报错
            dtc -I dtb -O dts "$dtb_file" -o "output/dts/node_${idx}.dts" 2>/dev/null || rm "output/dts/node_${idx}.dts"
          done

      - name: Smart Analysis (Panel Locator)
        run: |
          # 核心步骤：帮你从几十个 DTS 中过滤出控制屏幕的文件
          echo "--- 屏幕/刷新率相关配置索引 ---" > output/summary.txt
          grep -rnE "qcom,mdss-dsi-panel-name|framerate|max-brightness|touch-report-rate" output/dts/ >> output/summary.txt || true
          echo "分析完成，请查看 summary.txt 定位目标文件。"

      - name: Package Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: DTBO-Analysis-Result
          path: output/
